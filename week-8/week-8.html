<!DOCTYPE html>
<html>
<head>
<style>
/* Center the square */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background-color: #f0f0f0;
}

/* Square styling */
.square {
  width: 150px;
  height: 150px;
  background-color: rgb(100, 27, 49);

  /* Animation */
  animation: rotateSquare 2s linear infinite;
}

/* Keyframes for 360° rotation */
@keyframes rotateSquare {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="square"></div>

</body>
</html>
