<!DOCTYPE html>
<html>
<head>
<style>
/* Center the ball */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background-color: #f0f0f0;
}

/* Ball styling */
.ball {
  width: 80px;
  height: 80px;
  background-color: rgb(24, 48, 41);
  border-radius: 50%;

  /* Animation */
  animation: bounce 1s ease-in-out infinite;
}

/* Keyframes for up-down motion */
@keyframes bounce {
  0% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-150px);
  }
  100% {
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="ball"></div>

</body>
</html>
