<!DOCTYPE html>
<html>
<head>
  <title>Largest of Five Numbers</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      /* Math-style gradient background */
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background-color: #000e06;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #460619;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Find Largest Number</h2>

    <input type="number" id="num1" placeholder="Enter number 1">
    <input type="number" id="num2" placeholder="Enter number 2">
    <input type="number" id="num3" placeholder="Enter number 3">
    <input type="number" id="num4" placeholder="Enter number 4">
    <input type="number" id="num5" placeholder="Enter number 5">

    <button onclick="findLargest()">Find Largest</button>

    <div id="result"></div>
  </div>

  <script>
    function findLargest() {
      let a = document.getElementById("num1").value;
      let b = document.getElementById("num2").value;
      let c = document.getElementById("num3").value;
      let d = document.getElementById("num4").value;
      let e = document.getElementById("num5").value;

      if (a === "" || b === "" || c === "" || d === "" || e === "") {
        alert("Please enter all five numbers!");
        return;
      }

      a = parseFloat(a);
      b = parseFloat(b);
      c = parseFloat(c);
      d = parseFloat(d);
      e = parseFloat(e);

      let largest = a;

      if (b > largest) largest = b;
      if (c > largest) largest = c;
      if (d > largest) largest = d;
      if (e > largest) largest = e;

      document.getElementById("result").innerHTML =
        "Largest number is: " + largest;
    }
  </script>

</body>
</html>
