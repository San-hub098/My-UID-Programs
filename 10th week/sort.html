<!DOCTYPE html>
<html>
<head>
  <title>Sort 3 Numbers</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #667eea, #d7360932);
      margin-top: 100px;
      color: white;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background-color: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    h2 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Sort Numbers (Ascending Order)</h1>

<input type="number" id="num1" placeholder="Enter first number"><br>
<input type="number" id="num2" placeholder="Enter second number"><br>
<input type="number" id="num3" placeholder="Enter third number"><br>

<button onclick="sortNumbers()">Sort Numbers</button>

<h2 id="result"></h2>

<script>
function sortNumbers() {
  let a = parseFloat(document.getElementById("num1").value);
  let b = parseFloat(document.getElementById("num2").value);
  let c = parseFloat(document.getElementById("num3").value);

  // Check valid input
  if (isNaN(a) || isNaN(b) || isNaN(c)) {
    document.getElementById("result").innerHTML = "Please enter valid numbers!";
    return;
  }

  let temp;

  // Sorting logic
  if (a > b) {
    temp = a;
    a = b;
    b = temp;
  }

  if (a > c) {
    temp = a;
    a = c;
    c = temp;
  }

  if (b > c) {
    temp = b;
    b = c;
    c = temp;
  }

  document.getElementById("result").innerHTML =
    "Sorted numbers (Ascending): " + a + ", " + b + ", " + c;
}
</script>

</body>
</html>
