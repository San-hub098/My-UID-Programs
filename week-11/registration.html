<!DOCTYPE html>
<html>
<head>
    <title>Registration Validation</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            padding: 40px; 
        }
        .registration-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #333; text-align: center; }
        
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        /* Error Styles */
        input.error-border { border-color: #ff4d4d; background-color: #fff9f9; }
        .error-text { 
            color: #ff4d4d; 
            font-size: 0.75rem; 
            margin-top: 5px; 
            display: none; 
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="registration-card">
    <h2>Create Account</h2>
    <form id="regForm">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your name">
            <small id="nameError" class="error-text">Name cannot be empty.</small>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="text" id="email" placeholder="email@example.com">
            <small id="emailError" class="error-text">Please enter a valid email.</small>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
            <small id="passError" class="error-text">Password must be at least 6 characters.</small>
        </div>

        <button type="submit">Sign Up</button>
    </form>
</div>

<script>
    const form = document.getElementById('regForm');
    
    form.addEventListener('submit', function(event) {
        // Prevent actual submission so we can validate
        event.preventDefault();

        // Get values
        const name = document.getElementById('fullName');
        const email = document.getElementById('email');
        const password = document.getElementById('password');

        // Validation Flags
        let isValid = true;

        // 1. Name Validation (Not Empty)
        if (name.value.trim() === "") {
            showError(name, 'nameError');
            isValid = false;
        } else {
            hideError(name, 'nameError');
        }

        // 2. Email Validation (Regex)
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email.value)) {
            showError(email, 'emailError');
            isValid = false;
        } else {
            hideError(email, 'emailError');
        }

        // 3. Password Validation (Min 6 chars)
        if (password.value.length < 6) {
            showError(password, 'passError');
            isValid = false;
        } else {
            hideError(password, 'passError');
        }

        // Final Check
        if (isValid) {
            alert("Registration Successful!");
            form.reset(); // Clear the form
        }
    });

    // Helper functions to keep code clean
    function showError(input, errorId) {
        input.classList.add('error-border');
        document.getElementById(errorId).style.display = 'block';
    }

    function hideError(input, errorId) {
        input.classList.remove('error-border');
        document.getElementById(errorId).style.display = 'none';
    }
</script>

</body>
</html>
