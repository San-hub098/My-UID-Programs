<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Meter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f0f2f5; }
        .card { background: rgb(241, 4, 55); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input { 
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; outline: none; box-sizing: border-box;
            transition: border-color 0.3s; font-size: 1rem;
        }

        /* Strength Meter Styling */
        .strength-container { margin-top: 10px; }
        .strength-bar { 
            height: 8px; width: 100%; background: #1312128c; border-radius: 4px; overflow: hidden; margin-bottom: 5px; 
        }
        .strength-fill { 
            height: 100%; width: 0%; transition: width 0.3s, background-color 0.3s; 
        }
        #strength-text { font-size: 0.85rem; font-weight: bold; }

        /* Colors for different states */
        .weak { width: 33%; background-color: #ff4d4d; }
        .medium { width: 66%; background-color: #ffa500; }
        .strong { width: 100%; background-color: #2ecc71; }
    </style>
</head>
<body>

<div class="card">
    <label for="password">Create Password</label>
    <input type="password" id="password" placeholder="Enter password">
    
    <div class="strength-container">
        <div class="strength-bar">
            <div id="strength-fill" class="strength-fill"></div>
        </div>
        <span id="strength-text">Enter a password</span>
    </div>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const strengthFill = document.getElementById('strength-fill');
    const strengthText = document.getElementById('strength-text');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;

        if (!val) {
            updateUI(0, "Enter a password", "");
            return;
        }

        // 1. Length check
        if (val.length >= 8) score++;
        // 2. Mix of cases or numbers
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        // 3. Special characters
        if (/[^A-Za-z0-9]/.test(val)) score++;

        // Map score to UI
        if (score === 0 || val.length < 5) {
            updateUI(1, "Weak", "weak");
        } else if (score === 1 || score === 2) {
            updateUI(2, "Medium", "medium");
        } else {
            updateUI(3, "Strong", "strong");
        }
    });

    function updateUI(level, text, className) {
        strengthText.innerText = text;
        strengthText.style.color = level === 0 ? "#666" : ""; // Default grey if empty
        
        // Reset classes and apply the new one
        strengthFill.className = "strength-fill " + className;
        
        // Custom color logic for text if needed
        if (className === "weak") strengthText.style.color = "#ff4d4d";
        if (className === "medium") strengthText.style.color = "#ffa500";
        if (className === "strong") strengthText.style.color = "#2ecc71";
    }
</script>

</body>
</html>
