<!DOCTYPE html>
<html>
<head>
<style>

/* Page styling */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  background-color: #f0f0f0;
  overflow: hidden;
}

/* Circle styling */
.circle {
  width: 80px;
  height: 80px;
  background-color: rgb(151, 85, 216);
  border-radius: 50%;

  /* Animation */
  animation: moveRotate 3s linear infinite;
}

/* Keyframes for movement + rotation */
@keyframes moveRotate {
  0% {
    transform: translateX(0) rotate(0deg);
  }
  50% {
    transform: translateX(300px) rotate(180deg);
  }
  100% {
    transform: translateX(0) rotate(360deg);
  }
}

</style>
</head>

<body>

<div class="circle"></div>

</body>
</html>
