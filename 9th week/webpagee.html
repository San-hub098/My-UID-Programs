<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Programs</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://www.transparenttextures.com/patterns/cubes.png'),
                  linear-gradient(to right, #1e3c72, #2a5298);
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      margin: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      margin-bottom: 20px;
      color: #ddd;
    }

    .math-icons {
      font-size: 20px;
      margin-bottom: 15px;
      opacity: 0.7;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #00c9a7;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #00a386;
      transform: scale(1.05);
    }

    .output {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      font-size: 18px;
      min-height: 40px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="math-icons">∑ π √ ∞ ≈ ∫ Δ</div>

    <h1>Number Programs</h1>
    <div class="subtitle">Explore Mathematical Operations Easily</div>

    <input type="number" id="number" placeholder="Enter a number">

    <div>
      <button onclick="checkEvenOdd()">Even / Odd</button>
      <button onclick="checkPrime()">Prime</button>
      <button onclick="findFactorial()">Factorial</button>
      <button onclick="checkArmstrong()">Armstrong</button>
    </div>

    <div class="output" id="output">Result will appear here</div>
  </div>

  <script>
    function getInput() {
      let num = document.getElementById("number").value;
      if (num === "") {
        alert("Please enter a number");
        return null;
      }
      return parseInt(num);
    }

    function checkEvenOdd() {
      let num = getInput();
      if (num === null) return;

      let result = (num % 2 === 0) ? "Even Number" : "Odd Number";
      document.getElementById("output").innerText = result;
    }

    function checkPrime() {
      let num = getInput();
      if (num === null) return;

      if (num <= 1) {
        document.getElementById("output").innerText = "Not a Prime Number";
        return;
      }

      for (let i = 2; i <= Math.sqrt(num); i++) {
        if (num % i === 0) {
          document.getElementById("output").innerText = "Not a Prime Number";
          return;
        }
      }

      document.getElementById("output").innerText = "Prime Number";
    }

    function findFactorial() {
      let num = getInput();
      if (num === null) return;

      if (num < 0) {
        document.getElementById("output").innerText =
          "Factorial not defined for negative numbers";
        return;
      }

      let fact = 1;
      for (let i = 1; i <= num; i++) {
        fact *= i;
      }

      document.getElementById("output").innerText = "Factorial = " + fact;
    }

    function checkArmstrong() {
      let num = getInput();
      if (num === null) return;

      let sum = 0;
      let temp = num;
      let digits = num.toString().length;

      while (temp > 0) {
        let digit = temp % 10;
        sum += Math.pow(digit, digits);
        temp = Math.floor(temp / 10);
      }

      let result =
        (sum === num) ? "Armstrong Number" : "Not an Armstrong Number";

      document.getElementById("output").innerText = result;
    }
  </script>

</body>
</html>
