<!DOCTYPE html>
<html>
<head>
  <title>Sign Checker</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;

      /* Animated Gradient Background */
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;

      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Glass Container */
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      outline: none;
      text-align: center;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff7eb3;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4f81;
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    /* Floating Math Symbols */
    .math-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .math-bg span {
      position: absolute;
      color: rgba(255,255,255,0.2);
      font-size: 30px;
      animation: float 8s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<!-- Floating Symbols -->
<div class="math-bg">
  <span style="left:10%">+</span>
  <span style="left:25%">−</span>
  <span style="left:40%">×</span>
  <span style="left:55%">÷</span>
  <span style="left:70%">π</span>
  <span style="left:85%">√</span>
</div>

<div class="container">
  <h1>Sign Checker</h1>

  <input type="number" id="num1" placeholder="Enter first number">
  <input type="number" id="num2" placeholder="Enter second number">
  <input type="number" id="num3" placeholder="Enter third number">

  <br>
  <button onclick="findSign()">Check Sign</button>

  <div id="result"></div>
</div>

<script>
function findSign() {
  let a = parseFloat(document.getElementById("num1").value);
  let b = parseFloat(document.getElementById("num2").value);
  let c = parseFloat(document.getElementById("num3").value);

  let product = a * b * c;

  if (isNaN(a) || isNaN(b) || isNaN(c)) {
    document.getElementById("result").innerText = "⚠️ Please enter all numbers!";
    return;
  }

  if (product > 0) {
    document.getElementById("result").innerText = "✅ The sign is + (Positive)";
  } else if (product < 0) {
    document.getElementById("result").innerText = "❌ The sign is - (Negative)";
  } else {
    document.getElementById("result").innerText = "⚡ The product is 0";
  }
}
</script>

</body>
</html>
