<!DOCTYPE html>
<html>
<head>
    <title>Odd or Even Numbers</title>
</head>
<body>

<h2>Check Odd or Even (0 to 15)</h2>

<script>
for (let i = 0; i <= 15; i++) {
    if (i % 2 === 0) {
        document.write(i + " is even<br>");
    } else {
        document.write(i + " is odd<br>");
    }
}
</script>

</body>
</html>
