<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>
</head>
<body>

<h2>Student Average and Grade Calculator</h2>

<script>
// Read marks for 6 subjects
let total = 0;

for (let i = 1; i <= 6; i++) {
    let mark = parseFloat(prompt("Enter marks for subject " + i + ":"));
    total += mark;
}

// Calculate average
let average = total / 6;

// Determine grade
let grade;

if (average >= 90) {
    grade = "A+";
} else if (average >= 80) {
    grade = "A";
} else if (average >= 70) {
    grade = "B";
} else if (average >= 60) {
    grade = "C";
} else if (average >= 50) {
    grade = "D";
} else {
    grade = "F";
}

// Display result
document.write("Total Marks: " + total + "<br>");
document.write("Average Marks: " + average.toFixed(2) + "<br>");
document.write("Grade: " + grade);
</script>

</body>
</html>
